# ==========================================
# YoumuChan 配置文件
# ==========================================

# ------------------------------------------
# 基础 API 设置
# ------------------------------------------
# 模型服务商的 API Key (默认使用阿里云百炼)
api_key: your-api-key

# OpenAI 兼容格式的 API 接口地址
api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"

# 是否开启调试模式（开启后会在控制台打印完整的 API 请求与响应 JSON）
debug_mode: false

# ------------------------------------------
# AI 模型相关设置
# ------------------------------------------
# 边界分析模型（用于快速过滤信息、判断上下文和情感倾向等轻量级任务）
border_model: qwen3.5-flash
# 边界模型生成温度系数（0.0 表示最确定的输出）
border_temperature: 0.0

# 主对话模型（用于最终生成 YoumuChan 的回复，建议使用更智能的模型）
youmu_model: qwen3.5-plus
# 主对话模型生成温度系数（0.0 ~ 2.0，较高值有助于产生更活泼多样的对话）
youmu_temperature: 0.7

# ------------------------------------------
# 调度与时间周期设置
# ------------------------------------------
# 上下文时间窗口，单位：毫秒 (默认 1800000ms = 30分钟)
# 决定了 AI 在生成回复时，能追溯多远之前的聊天记录与事件
time_window_ms: 1800000

# 基础调度间隔，单位：毫秒 (默认 20000ms = 20秒)
# 调度器每隔多久进行一次状态评估与可能的对话生成
base_interval_ms: 20000

# ------------------------------------------
# 缓存与热度系统设置
# ------------------------------------------
# 内存中游戏事件缓存的保留时间，单位：毫秒 (默认 600000ms = 10分钟)
cache_duration_ms: 600000

# 内存中游戏事件缓存的最大条数限制
cache_max_size: 30

# 热度衰减半衰期，单位：秒 (默认 30秒)
# 玩家活跃度带来的“热度”会随时间指数衰减，半衰期越短降温越快
half_life_seconds: 60

# ------------------------------------------
# 游戏内展示设置
# ------------------------------------------
# AI 机器人在游戏中说话时显示的虚拟玩家名称
youmu_name: YoumuChan
